# Coral Source Configuration for Local Personal Monitor
name: behavior_monitor_local
description: "Local database exposing StayFree screen metrics and Google Drive Health Connect entries."
type: local

config:
  tables:
    - name: stayfree_events
      description: "Individual screen sessions showing active web focus and synced Android apps."
      path: "C:/Users/lenovo/Desktop/San/Fun_Projects/Coral Project/data/coral/csv/stayfree_events.csv"
      format: csv
      schema:
        columns:
          - name: event_id
            type: string
          - name: timestamp_utc
            type: string
          - name: timestamp_ist
            type: string
          - name: date_ist
            type: string
          - name: hour_ist
            type: int
          - name: weekday_ist
            type: int
          - name: platform
            type: string
          - name: device_type
            type: string
          - name: domain_or_app
            type: string
          - name: app_or_domain_normalized
            type: string
          - name: category
            type: string
          - name: subcategory
            type: string
          - name: duration_seconds
            type: double
          - name: duration_minutes
            type: double
          - name: is_web
            type: boolean
          - name: is_android
            type: boolean
          - name: is_late_night
            type: boolean
          - name: late_night_window
            type: string
          - name: source
            type: string
          - name: raw_key
            type: string
          - name: raw_payload_available
            type: boolean
          - name: data_quality_flags
            type: string

